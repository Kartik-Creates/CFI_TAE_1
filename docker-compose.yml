version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: cyber_risk_db
    environment:
      POSTGRES_USER: cyberuser
      POSTGRES_PASSWORD: cyberpass123
      POSTGRES_DB: cyber_risk_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cyber_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyber_risk_backend
    environment:
      DATABASE_URL: postgresql://cyberuser:cyberpass123@postgres:5432/cyber_risk_db
      SECRET_KEY: your-super-secret-key-change-in-production
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - ./models:/app/models
    networks:
      - cyber_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cyber_risk_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - cyber_network

networks:
  cyber_network:
    driver: bridge

volumes:
  postgres_data: